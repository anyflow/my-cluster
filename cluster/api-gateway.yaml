apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: api-gateway
  namespace: cluster
spec:
  gatewayClassName: istio
  addresses:
    - type: Hostname
      value: istio-ingressgateway.cluster.svc.cluster.local
  listeners:
    - name: https-api-anyflow-net
      hostname: api.anyflow.net
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: api-anyflow-net-tls
      allowedRoutes:
        namespaces:
          from: All
