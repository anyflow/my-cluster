apiVersion: v1
kind: Namespace
metadata:
  name: kagent
  labels:
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: waypoint-kagent
    istio.io/ingress-use-waypoint: "true"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: waypoint-kagent
  namespace: kagent
  labels:
    istio.io/waypoint-for: kagent
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - allowedRoutes:
        namespaces:
          from: Same
      name: mesh
      port: 15008
      protocol: HBONE
