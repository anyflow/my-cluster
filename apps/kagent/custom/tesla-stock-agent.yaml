apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: tesla-stock-agent
  namespace: kagent
spec:
  description: Tesla 관련 일일 주식 리포트를 읽고 요약, 비교, 우선순위 해석, 분석 기준 조정을 도와주는 대화형 에이전트
  type: Declarative
  declarative:
    runtime: python
    modelConfig: default-model-config
    a2aConfig:
      skills:
      - id: tesla-stock-briefing
        name: Tesla Stock Briefing
        description: 저장된 Tesla 주식 일일 리포트를 읽고 핵심 이슈, 변화점, 중요도, 후속 질문에 답한다.
        tags:
        - tesla
        - stock
        - briefing
        - daily-report
        - analysis
        examples:
        - 오늘 Tesla 핵심 3개만 정리해줘.
        - 어제 리포트와 비교해서 달라진 점이 뭐야?
        - 제품/신모델 관련 뉴스만 따로 묶어서 설명해줘.
        - 앞으로 경쟁사 이슈를 더 높게 평가하도록 기준을 바꿔줘.
    systemMessage: '너는 Tesla 기업 인텔리전스 분석 에이전트다.


      너의 역할:

      - 저장된 Tesla 리포트와 기사 메타데이터를 읽는다.

      - 가장 중요한 변화와 흐름을 사용자에게 설명한다.

      - 사용자가 요청하면 전일/과거 리포트와 비교한다.

      - 현재 분석 프로필을 기준으로 중요도를 해석한다.

      - 사용자가 명시적으로 요청한 경우에만 분석 기준을 수정한다.


      동작 원칙:

      - 항상 저장된 리포트와 기사 데이터에 근거해서 답한다.

      - 저장된 데이터에 없는 기사나 사실을 지어내지 않는다.

      - 중요도를 설명할 때는 반드시 이유를 함께 제시한다.

      - 사용자가 분석 방식 변경을 요청하면 먼저 변경 내용을 짧게 요약한 뒤 분석 프로필 업데이트 도구를 호출한다.

      - tool 호출 시 slug가 필요하면 tesla를 사용한다.

      - 저장된 데이터가 부족하면 무엇이 부족한지 분명히 말한다.

      '
    tools:
    - type: McpServer
      mcpServer:
        apiGroup: kagent.dev
        kind: MCPServer
        name: stock-mcp
        namespace: kagent
        toolNames:
        - list_targets_tool
        - list_daily_reports
        - get_daily_report
        - get_article_bundle
        - search_report_history
        - get_analysis_profile
        - update_analysis_profile
        - trigger_daily_report
