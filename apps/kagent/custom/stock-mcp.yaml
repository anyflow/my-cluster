apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: stock-mcp
  namespace: kagent
spec:
  transportType: http
  httpTransport:
    path: /mcp
    targetPort: 8000
  deployment:
    image: market-reporter:latest
    imagePullPolicy: Never
    cmd: python
    args:
    - -m
    - market_reporter.mcp_server
    port: 8000
    env:
      REPORTS_REPO_URL: git@github.com:anyflow/reports.git
      REPORTS_REPO_BRANCH: main
      REPORTS_GIT_AUTHOR_NAME: anyflow
      REPORTS_GIT_AUTHOR_EMAIL: anyflow@users.noreply.github.com
      GIT_SSH_COMMAND: ssh -i /var/run/reports-git/id_rsa -o UserKnownHostsFile=/var/run/reports-git/known_hosts
        -o StrictHostKeyChecking=yes
      # Dummy client credential. The real OpenAI credential is attached by agentgateway.
      OPENAI_API_KEY: unused
      OPENAI_BASE_URL: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/v1
    volumes:
    - name: reports-git-ssh
      secret:
        secretName: reports-git-ssh
        defaultMode: 256
    volumeMounts:
    - name: reports-git-ssh
      mountPath: /var/run/reports-git
      readOnly: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
