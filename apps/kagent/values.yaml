controller:
  a2aBaseUrl: https://kagent.anyflow.net

proxy:
  url: http://public-gateway.cluster.svc.cluster.local

providers:
  default: openAI
  openAI:
    # kagent still needs an OpenAI-compatible provider/model and api key field
    # to initialize its client. The key below is a dummy internal placeholder;
    # the real upstream OpenAI credential is owned by agentgateway.
    provider: OpenAI
    model: gpt-5.4-mini
    apiKeySecretRef: dummy
    apiKeySecretKey: dummy
    config:
      baseUrl: http://public-gateway.cluster.svc.cluster.local/v1

otel:
  tracing:
    enabled: true
    exporter:
      otlp:
        endpoint: http://otel-otlp-collector.observability.svc.cluster.local:4317
        protocol: grpc
        insecure: true
        timeout: 15

grafana-mcp:
  grafana:
    url: http://grafana.observability.svc.cluster.local
    secretRef: kagent-grafana-mcp-ext
  image:
    tag: latest
    pullPolicy: Always

kagent-tools:
  otel:
    tracing:
      enabled: true
      exporter:
        otlp:
          endpoint: http://otel-otlp-collector.observability.svc.cluster.local:4317
          insecure: true
          timeout: 15
  tools:
    enabledTools:
      - k8s
      - helm
      - istio
      - prometheus
      - kubescape
      - utils

agents:
  k8s-agent:
    enabled: true
  istio-agent:
    enabled: true
  promql-agent:
    enabled: true
  observability-agent:
    enabled: true
  helm-agent:
    enabled: true
  kgateway-agent:
    enabled: false
  argo-rollouts-agent:
    enabled: false
  cilium-policy-agent:
    enabled: false
  cilium-manager-agent:
    enabled: false
  cilium-debug-agent:
    enabled: false

querydoc:
  otel:
    tracing:
      enabled: true
      exporter:
        otlp:
          endpoint: http://otel-otlp-collector.observability.svc.cluster.local:4317
          insecure: true
          timeout: 10000

kmcp:
  enabled: true
