apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kagent
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: public-gateway
      namespace: cluster
      kind: Gateway
  hostnames:
    - kagent.anyflow.net
  rules:
    - matches:
        - path:
            type: Exact
            value: /logout
      filters:
        - type: RequestRedirect
          requestRedirect:
            hostname: api.anyflow.net
            scheme: https
            path:
              type: ReplaceFullPath
              replaceFullPath: /auth/logout
            statusCode: 302
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: agentgateway-proxy
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api/a2a
      backendRefs:
        - name: agentgateway-proxy
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: agentgateway-proxy
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: agentgateway-proxy
          port: 80
