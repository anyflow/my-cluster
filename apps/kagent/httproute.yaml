apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kagent
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: public-gateway
      namespace: cluster
      kind: Gateway
  hostnames:
    - kagent.anyflow.net
  rules:
    - matches:
        - path:
            type: Exact
            value: /logout
      filters:
        - type: RequestRedirect
          requestRedirect:
            hostname: api.anyflow.net
            scheme: https
            path:
              type: ReplaceFullPath
              replaceFullPath: /oauth2/sign_out?rd=https%3A%2F%2Fapi.anyflow.net%2Fauth%2Flogout
            statusCode: 302
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2
      backendRefs:
        - name: oauth2-proxy
          namespace: cluster
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: agentgateway-proxy
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api/a2a
      backendRefs:
        - name: agentgateway-proxy
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: kagent-controller
          namespace: kagent
          port: 8083
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kagent-ui
          namespace: kagent
          port: 8080
