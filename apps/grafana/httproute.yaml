apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: observability
spec:
  parentRefs:
    - name: public-gateway
      namespace: cluster
      kind: Gateway
  hostnames:
    - grafana.anyflow.net
  rules:
    - name: grafana-logout
      matches:
        - path:
            type: Exact
            value: /logout
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Set-Cookie
                value: agw_oidc_s_0b73060d2562125a=; Path=/; Max-Age=0; HttpOnly; SameSite=Lax; Secure
        - type: RequestRedirect
          requestRedirect:
            hostname: api.anyflow.net
            scheme: https
            path:
              type: ReplaceFullPath
              replaceFullPath: /auth/logout
            statusCode: 302
    - name: grafana-browser
      matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: grafana
          namespace: observability
          port: 80
