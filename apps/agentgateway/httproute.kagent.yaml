apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kagent-upstream
  namespace: cluster
spec:
  parentRefs:
    - name: public-gateway
      namespace: cluster
      kind: Gateway
  hostnames:
    - public-gateway.cluster.svc
    - public-gateway.cluster.svc.cluster.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
          headers:
            - name: x-kagent-host
              value: stock-mcp.kagent
      backendRefs:
        - name: stock-mcp
          namespace: kagent
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
          headers:
            - name: x-kagent-host
              value: kagent-tools.kagent
      backendRefs:
        - name: kagent-tools
          namespace: kagent
          port: 8084
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
          headers:
            - name: x-kagent-host
              value: kagent-grafana-mcp.kagent
      backendRefs:
        - name: kagent-grafana-mcp
          namespace: kagent
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: kagent-mcp
          namespace: kagent
          port: 8083
    - matches:
        - path:
            type: PathPrefix
            value: /
          headers:
            - name: x-kagent-host
              value: samsung-stock-agent.kagent
      backendRefs:
        - name: samsung-stock-agent-a2a
          namespace: kagent
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
          headers:
            - name: x-kagent-host
              value: tesla-stock-agent.kagent
      backendRefs:
        - name: tesla-stock-agent-a2a
          namespace: kagent
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kagent-a2a
          namespace: kagent
          port: 8083
