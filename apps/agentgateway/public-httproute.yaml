apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kagent-public
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: public-gateway
      namespace: cluster
      kind: Gateway
  hostnames:
    - kagent.anyflow.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: agentgateway-proxy
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /api/a2a
      backendRefs:
        - name: agentgateway-proxy
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kagent-ui
          namespace: kagent
          port: 8080
