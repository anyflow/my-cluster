apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: public-gateway
  namespace: cluster
spec:
  service:
    spec:
      type: NodePort
      ports:
        - name: listener-80
          port: 80
          protocol: TCP
          targetPort: 80
          nodePort: 30080
        - name: listener-443
          port: 443
          protocol: TCP
          targetPort: 443
          nodePort: 30443
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: admin-ui-proxy
              image: alpine/socat:latest
              args:
                - TCP-LISTEN:15002,fork,reuseaddr,bind=0.0.0.0
                - TCP:127.0.0.1:15000
              ports:
                - containerPort: 15002
                  name: admin-ui
                  protocol: TCP
  env:
    - name: OIDC_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: agentgateway-oidc-secret
          key: client-id
    - name: OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: agentgateway-oidc-secret
          key: client-secret
    - name: OIDC_COOKIE_SECRET
      valueFrom:
        secretKeyRef:
          name: agentgateway-oidc-secret
          key: oidc-cookie-secret
  rawConfig:
    policies:
      - name:
          name: kagent-mcp-stock-jwt
          namespace: cluster
        target:
          route:
            name: kagent-external
            namespace: cluster
            ruleName: kagent-mcp-stock
            kind: HTTPRoute
        phase: route
        policy:
          jwtAuth: &authelia_api_jwt
            mode: strict
            issuer: https://api.anyflow.net/auth
            audiences:
              - my-cluster-api
            jwks:
              url: http://authelia.cluster.svc.cluster.local/auth/jwks.json
            jwtValidationOptions:
              requiredClaims:
                - exp
                - iss
                - aud
      - name:
          name: kagent-mcp-tools-jwt
          namespace: cluster
        target:
          route:
            name: kagent-external
            namespace: cluster
            ruleName: kagent-mcp-tools
            kind: HTTPRoute
        phase: route
        policy:
          jwtAuth: *authelia_api_jwt
      - name:
          name: kagent-mcp-grafana-jwt
          namespace: cluster
        target:
          route:
            name: kagent-external
            namespace: cluster
            ruleName: kagent-mcp-grafana
            kind: HTTPRoute
        phase: route
        policy:
          jwtAuth: *authelia_api_jwt
      - name:
          name: kagent-mcp-jwt
          namespace: cluster
        target:
          route:
            name: kagent-external
            namespace: cluster
            ruleName: kagent-mcp
            kind: HTTPRoute
        phase: route
        policy:
          jwtAuth: *authelia_api_jwt
      - name:
          name: kagent-a2a-samsung-jwt
          namespace: cluster
        target:
          route:
            name: kagent-external
            namespace: cluster
            ruleName: kagent-a2a-samsung
            kind: HTTPRoute
        phase: route
        policy:
          jwtAuth: *authelia_api_jwt
      - name:
          name: kagent-a2a-tesla-jwt
          namespace: cluster
        target:
          route:
            name: kagent-external
            namespace: cluster
            ruleName: kagent-a2a-tesla
            kind: HTTPRoute
        phase: route
        policy:
          jwtAuth: *authelia_api_jwt
      - name:
          name: kagent-a2a-jwt
          namespace: cluster
        target:
          route:
            name: kagent-external
            namespace: cluster
            ruleName: kagent-a2a
            kind: HTTPRoute
        phase: route
        policy:
          jwtAuth: *authelia_api_jwt
      - name:
          name: kagent-api-oidc
          namespace: cluster
        target:
          route:
            name: kagent-external
            namespace: cluster
            ruleName: kagent-api
            kind: HTTPRoute
        phase: route
        policy:
          oidc: &kagent_browser_oidc
            issuer: https://api.anyflow.net/auth
            authorizationEndpoint: https://api.anyflow.net/auth/api/oidc/authorization
            tokenEndpoint: http://authelia.cluster.svc.cluster.local/auth/api/oidc/token
            jwks:
              url: http://authelia.cluster.svc.cluster.local/auth/jwks.json
            clientId: ${OIDC_CLIENT_ID}
            clientSecret: ${OIDC_CLIENT_SECRET}
            redirectURI: https://kagent.anyflow.net/oauth2/callback
            scopes:
              - email
              - profile
      - name:
          name: kagent-browser-oidc
          namespace: cluster
        target:
          route:
            name: kagent-external
            namespace: cluster
            ruleName: kagent-browser
            kind: HTTPRoute
        phase: route
        policy:
          oidc: *kagent_browser_oidc
      - name:
          name: agentgateway-admin-oidc
          namespace: cluster
        target:
          route:
            name: agentgateway-admin-external
            namespace: cluster
            ruleName: agentgateway-admin
            kind: HTTPRoute
        phase: route
        policy:
          oidc:
            issuer: https://api.anyflow.net/auth
            authorizationEndpoint: https://api.anyflow.net/auth/api/oidc/authorization
            tokenEndpoint: http://authelia.cluster.svc.cluster.local/auth/api/oidc/token
            jwks:
              url: http://authelia.cluster.svc.cluster.local/auth/jwks.json
            clientId: ${OIDC_CLIENT_ID}
            clientSecret: ${OIDC_CLIENT_SECRET}
            redirectURI: https://agentgateway.anyflow.net/oauth2/callback
            scopes:
              - email
              - profile
      - name:
          name: kiali-browser-oidc
          namespace: cluster
        target:
          route:
            name: kiali
            namespace: istio-system
            ruleName: kiali-browser
            kind: HTTPRoute
        phase: route
        policy:
          oidc:
            issuer: https://api.anyflow.net/auth
            authorizationEndpoint: https://api.anyflow.net/auth/api/oidc/authorization
            tokenEndpoint: http://authelia.cluster.svc.cluster.local/auth/api/oidc/token
            jwks:
              url: http://authelia.cluster.svc.cluster.local/auth/jwks.json
            clientId: ${OIDC_CLIENT_ID}
            clientSecret: ${OIDC_CLIENT_SECRET}
            redirectURI: https://kiali.anyflow.net/oauth2/callback
            scopes:
              - email
              - profile
      - name:
          name: prometheus-browser-oidc
          namespace: cluster
        target:
          route:
            name: prometheus
            namespace: observability
            ruleName: prometheus-browser
            kind: HTTPRoute
        phase: route
        policy:
          oidc:
            issuer: https://api.anyflow.net/auth
            authorizationEndpoint: https://api.anyflow.net/auth/api/oidc/authorization
            tokenEndpoint: http://authelia.cluster.svc.cluster.local/auth/api/oidc/token
            jwks:
              url: http://authelia.cluster.svc.cluster.local/auth/jwks.json
            clientId: ${OIDC_CLIENT_ID}
            clientSecret: ${OIDC_CLIENT_SECRET}
            redirectURI: https://prometheus.anyflow.net/oauth2/callback
            scopes:
              - email
              - profile
      - name:
          name: grafana-browser-oidc
          namespace: cluster
        target:
          route:
            name: grafana
            namespace: observability
            ruleName: grafana-browser
            kind: HTTPRoute
        phase: route
        policy:
          oidc:
            issuer: https://api.anyflow.net/auth
            authorizationEndpoint: https://api.anyflow.net/auth/api/oidc/authorization
            tokenEndpoint: http://authelia.cluster.svc.cluster.local/auth/api/oidc/token
            jwks:
              url: http://authelia.cluster.svc.cluster.local/auth/jwks.json
            clientId: ${OIDC_CLIENT_ID}
            clientSecret: ${OIDC_CLIENT_SECRET}
            redirectURI: https://grafana.anyflow.net/oauth2/callback
            scopes:
              - email
              - profile
