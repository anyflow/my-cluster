apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kagent-external
  namespace: cluster
spec:
  parentRefs:
    - name: public-gateway
      namespace: cluster
      kind: Gateway
  hostnames:
    - kagent.anyflow.net
  rules:
    - name: kagent-logout
      matches:
        - path:
            type: Exact
            value: /logout
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Set-Cookie
                value: agw_oidc_s_4dcbe721409e82b1=; Path=/; Max-Age=0; HttpOnly; SameSite=Lax; Secure
        - type: RequestRedirect
          requestRedirect:
            hostname: api.anyflow.net
            scheme: https
            path:
              type: ReplaceFullPath
              replaceFullPath: /auth/logout
            statusCode: 302
    - name: kagent-mcp-stock
      matches:
        - path:
            type: PathPrefix
            value: /mcp
          headers:
            - name: x-kagent-host
              value: stock-mcp.kagent
      backendRefs:
        - name: stock-mcp
          namespace: kagent
          port: 8000
    - name: kagent-mcp-tools
      matches:
        - path:
            type: PathPrefix
            value: /mcp
          headers:
            - name: x-kagent-host
              value: kagent-tools.kagent
      backendRefs:
        - name: kagent-tools
          namespace: kagent
          port: 8084
    - name: kagent-mcp-grafana
      matches:
        - path:
            type: PathPrefix
            value: /mcp
          headers:
            - name: x-kagent-host
              value: kagent-grafana-mcp.kagent
      backendRefs:
        - name: kagent-grafana-mcp
          namespace: kagent
          port: 8000
    - name: kagent-mcp
      matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: kagent-mcp
          namespace: kagent
          port: 8083
    - name: kagent-a2a-samsung
      matches:
        - path:
            type: PathPrefix
            value: /api/a2a
          headers:
            - name: x-kagent-host
              value: samsung-stock-agent.kagent
      backendRefs:
        - name: samsung-stock-agent-a2a
          namespace: kagent
          port: 8080
    - name: kagent-a2a-tesla
      matches:
        - path:
            type: PathPrefix
            value: /api/a2a
          headers:
            - name: x-kagent-host
              value: tesla-stock-agent.kagent
      backendRefs:
        - name: tesla-stock-agent-a2a
          namespace: kagent
          port: 8080
    - name: kagent-a2a
      matches:
        - path:
            type: PathPrefix
            value: /api/a2a
      backendRefs:
        - name: kagent-a2a
          namespace: kagent
          port: 8083
    - name: kagent-api
      matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: kagent-controller
          namespace: kagent
          port: 8083
    - name: kagent-browser
      matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kagent-ui
          namespace: kagent
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentgateway-admin-external
  namespace: cluster
spec:
  parentRefs:
    - name: public-gateway
      namespace: cluster
      kind: Gateway
  hostnames:
    - agentgateway.anyflow.net
  rules:
    - name: agentgateway-admin-logout
      matches:
        - path:
            type: Exact
            value: /logout
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Set-Cookie
                value: agw_oidc_s_20ab83a6c29dbfa7=; Path=/; Max-Age=0; HttpOnly; SameSite=Lax; Secure
        - type: RequestRedirect
          requestRedirect:
            hostname: api.anyflow.net
            scheme: https
            path:
              type: ReplaceFullPath
              replaceFullPath: /auth/logout
            statusCode: 302
    - name: agentgateway-admin-root
      matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /ui/
            statusCode: 302
    - name: agentgateway-admin
      matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: agentgateway-admin
          port: 15001
