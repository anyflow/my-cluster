apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-logout
  namespace: cluster
spec:
  parentRefs:
    - name: public-gateway
      namespace: cluster
      kind: Gateway
  hostnames:
    - api.anyflow.net
  rules:
    - matches:
        - path:
            type: Exact
            value: /logout
      filters:
        - type: RequestRedirect
          requestRedirect:
            hostname: api.anyflow.net
            scheme: https
            path:
              type: ReplaceFullPath
              replaceFullPath: /auth/logout
            statusCode: 302
