apiVersion: v1
kind: Secret
metadata:
  name: authelia-config
  namespace: cluster
type: Opaque
stringData:
  configuration.yml: |
    theme: auto

    server:
      address: tcp://0.0.0.0:9091/auth
      endpoints:
        authz:
          ext-authz:
            implementation: ExtAuthz

    log:
      level: info

    totp:
      issuer: anyflow.net

    authentication_backend:
      file:
        path: /config/users_database.yml

    access_control:
      default_policy: deny
      rules:
        - domain: api.anyflow.net
          resources:
            - '^/auth(?:$|/.*)'
          policy: bypass
        - domain: kagent.anyflow.net
          policy: one_factor
        - domain: agentgateway.anyflow.net
          policy: one_factor

    session:
      secret: REPLACE_ME
      cookies:
        - domain: anyflow.net
          authelia_url: https://api.anyflow.net/auth
          default_redirection_url: https://kagent.anyflow.net/

    storage:
      encryption_key: REPLACE_ME
      local:
        path: /data/db.sqlite3

    notifier:
      filesystem:
        filename: /data/notification.txt

    identity_validation:
      reset_password:
        jwt_secret: REPLACE_ME
    identity_providers:
      oidc:
        hmac_secret: REPLACE_ME_64_OR_MORE_RANDOM_CHARS
        jwks:
          - key_id: my-cluster-rs256
            algorithm: RS256
            use: sig
            key: |
              -----BEGIN PRIVATE KEY-----
              REPLACE_ME
              -----END PRIVATE KEY-----
        clients:
          - client_id: my-cluster-oauth2-proxy
            client_name: My Cluster OAuth2 Proxy
            client_secret: REPLACE_WITH_DIGEST
            public: false
            authorization_policy: one_factor
            consent_mode: implicit
            require_pkce: false
            redirect_uris:
              - https://kagent.anyflow.net/oauth2/callback
              - https://agentgateway.anyflow.net/oauth2/callback
            scopes:
              - openid
              - email
              - profile
            response_types:
              - code
            grant_types:
              - authorization_code
            access_token_signed_response_alg: none
            userinfo_signed_response_alg: none
            token_endpoint_auth_method: client_secret_basic
          - client_id: my-cluster-local
            client_name: My Cluster Local Mac
            client_secret: REPLACE_WITH_DIGEST
            public: false
            authorization_policy: one_factor
            audience:
              - my-cluster-api
            requested_audience_mode: explicit
            scopes:
              - email
              - profile
            grant_types:
              - client_credentials
            access_token_signed_response_alg: RS256
            token_endpoint_auth_method: client_secret_basic
  users_database.yml: |
    users:
      anyflow:
        disabled: false
        displayname: Anyflow
        password: REPLACE_WITH_ARGON2ID_HASH
        email: anyflow@anyflow.net
        groups:
          - admins
